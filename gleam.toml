name = "glance"
version = "6.1.0"
description = "Fork of lpil/glance with comment extraction support"

# Fork of https://github.com/lpil/glance
# Upstream remote: `upstream` (origin removed to avoid accidental pushes)
# Delta: CommentKind, Comment types + collect_comments pipeline on Module.

[dependencies]
gleam_stdlib = ">= 0.28.0 and < 2.0.0"
glexer = ">= 2.0.0 and < 3.0.0"

[dev-dependencies]
gleeunit = "~> 1.0"
pprint = ">= 1.0.4 and < 2.0.0"

# Birdie deps
justin = ">= 1.0.1 and < 2.0.0"
gleam_community_ansi = ">= 1.4.0 and < 2.0.0"
argv = ">= 1.0.2 and < 2.0.0"
gleam_erlang = ">= 0.25.0 and < 1.0.0"
rank = ">= 1.0.0 and < 2.0.0"
filepath = ">= 1.1.0 and < 2.0.0"
trie_again = ">= 1.1.2 and < 2.0.0"
simplifile = ">= 2.2.0 and < 3.0.0"
edit_distance = ">= 2.0.1 and < 3.0.0"
term_size = ">= 1.0.1 and < 2.0.0"
